function parseAllAccounts() {
const container = document.getElementById("inputData");
const table = container.querySelector('table');
if (!table) return [];
let submitColIdx = 7;
try {
let headerRow = table.querySelector('thead tr');
if (!headerRow) headerRow = table.rows[0];
if (headerRow) {
const heads = Array.from(headerRow.cells || []).map(h => h.innerText.trim());
for (let i = 0; i < heads.length; i++) {
if (/提交时间|更新时间|提交日期/.test(heads[i])) {
if (i >= 1 && i <= 6) continue;
submitColIdx = i;
break;
}
}
}
} catch (e) {}
const rows = Array.from(table.rows).slice(1);
const allItems = [];
rows.forEach(row => {
const cells = row.cells;
if (!cells || cells.length === 0) return;
const name = (cells[0] && cells[0].innerText) ? cells[0].innerText.trim() : '';
const accounts = [
cells[1] ? cells[1].innerText.trim() : '',
cells[2] ? cells[2].innerText.trim() : '',
cells[3] ? cells[3].innerText.trim() : '',
cells[4] ? cells[4].innerText.trim() : '',
cells[5] ? cells[5].innerText.trim() : '',
cells[6] ? cells[6].innerText.trim() : ''
];
const submit = (cells[submitColIdx] && cells[submitColIdx].innerText) ? cells[submitColIdx].innerText.trim() : '';
accounts.forEach((text, k) => {
if (!text || text.trim() === '') return;
const trimmedText = text.trim();
const valMatch = trimmedText.replace(/,/g, '').match(/\d+(\.\d+)?/);
if (!valMatch) return;
const val = parseFloat(valMatch[0]);
if (isNaN(val) || val < 0) return;
const updateTs = parseTimeToTs(submit) || null;
if (!isWithin7Days(submit, updateTs)) return;
allItems.push({
群昵称: name,
账号: `账号${k+1}`,
书币: text,
数值: val,
是否过期: /过期|到期/.test(text),
是否挑战: /挑战/.test(text),
是否网文: /网文/.test(text),
是否暂停: /暂停接单|预定|预订/.test(text),
提交时间: submit,
更新时间: formatUpdateTime(submit),
更新时间_ts: updateTs
    });
  })
});
return allItems;
}

function updateGroupSortTable() {
  const allItems = parseAllAccounts();
const groups = [[], [], [], [], [], [], []];
allItems.forEach(item => {
let groupIdx;
const isReserve = item.是否暂停 && (item.书币.includes("预定") || item.书币.includes("预订"));
if (item.是否暂停 && !isReserve) {
groupIdx = 6;
} else {
groupIdx = getGroupIndex(item.数值);
}
if (groupIdx >= 0 && groupIdx < groups.length) {
groups[groupIdx].push(item);
}
});
const groupOrder = ['正常组', '挑战组', '弃置组'];
for (let i = 1; i <= 6; i++) {
if (groups[i].length > 0) {
groups[i].sort((a, b) => {
if (a.数值 !== b.数值) return b.数值 - a.数值;
const aIsReserve = a.是否暂停 && (a.书币.includes("预定") || a.书币.includes("预订"));
const bIsReserve = b.是否暂停 && (b.书币.includes("预定") || b.书币.includes("预订"));
if (aIsReserve && !bIsReserve) return 1;
if (!aIsReserve && bIsReserve) return -1;
if (!aIsReserve && !bIsReserve) {
const aGroup = classify(a);
const bGroup = classify(b);
const aIdx = groupOrder.indexOf(aGroup);
const bIdx = groupOrder.indexOf(bGroup);
if (aIdx !== bIdx && aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
}
return (b.更新时间_ts || 0) - (a.更新时间_ts || 0);
});
}
}
const headers = ["x>=100", "80<=x<100", "50<=x<80", "30<=x<50", "x<30", "暂停接单"];

function getCellStyle(item, groupId) {
let style = "";
const isReserve = item.是否暂停 && (item.书币.includes("预定") || item.书币.includes("预订"));
if (isReserve) {
style += "background-color:#e6e6e6;color:#646464;";
} else if (item.是否暂停) {
style += "background-color:#e6e6e6;color:#646464;";
} else {
const group = classify(item);
switch (group) {
case '正常组': style += "color:#333;font-weight:bold;"; break;
case '挑战组': style += "color:#008000;font-weight:bold;"; break;
case '弃置组': style += "color:#aaa;"; break;
}
if (item.是否网文) style += "color:#336699;";
const num = item.数值;
if (num >= 100) {
style += "background-color:rgb(255, 150, 150);";
} else if (num >= 80) {
style += "background-color:rgb(255, 200, 150);";
} else if (num >= 50) {
style += "background-color:rgb(255, 255, 200);";
} else if (num >= 30) {
style += "background-color:rgb(200, 255, 200);";
} else {
style += "background-color:rgb(200, 220, 255);";
}
}
// “过期”仅修改字体（红+粗），背景仍按数值分段颜色显示；“预定/预订”保持灰底
if (item.是否过期) style += "color:#ff0000;font-weight:bold;";
return style;
}
